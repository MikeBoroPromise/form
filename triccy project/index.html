<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <div class="form-container">
      <div class="form-container-inner">
        <form action="" id="form" class="form">
          <div class="first form-field">
            <label for="First name">First name </label>
            <input
              type="text"
              placeholder="first name"
              required
              id="firstname"
              class="input"
            />
          </div>
          <div class="second form-field">
            <label for="Last name">Last Name </label>
            <input
              type="text"
              placeholder="Last name"
              required
              id="lastname"
              class="input"
            />
          </div>

          <div class="gender form-field">
            <label for="Gender" id="third">Gender</label>
            <select id="option" class="input">
              <option value="female">Female</option>
              <option value="male">Male</option>
            </select>
          </div>

          <div class="date form-field">
            <label for="Date of birth" id="dateofbirth">Date of Birth</label>
            <input type="date" id="date" class="input" />
          </div>

          <div class="weight form-field">
            <label for="Weight">Weight (kG)</label>
            <input
              type="text"
              placeholder="Enter Weight"
              id="weight"
              class="input"
              required
            />
          </div>
          <div class="Height form-field">
            <label for="height">Height (CM)</label>
            <input
              type="text"
              placeholder="Enter height here"
              id="height"
              class="input"
              required
            />
          </div>
          <div class="email form-field">
            <label for="Email">Email</label>
            <input
              type="email"
              id="email"
              class="input"
              required
              placeholder=" Enter Email"
            />
          </div>

          <div class="password form-field">
            <label for="Password">Password</label>
            <input
              type="password"
              id="password"
              class="input"
              name="Password"
              placeholder="Enter password"
              required
            />
          </div>
        </form>
        <div class="button">
          <button id="Register" type="submit" form="form">Register</button>
        </div>
      </div>
    </div>
    <script src="./form.js"></script>
  </body>
</html>
